name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: Build release artifacts
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install dependencies
        run: npm ci

      - name: Verify release tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $packageVersion = (Get-Content packages/cli/package.json | ConvertFrom-Json).version
          $tagVersion = "${{ github.ref_name }}" -replace '^v', ''
          if ($packageVersion -ne $tagVersion) {
            throw "Release tag v$tagVersion does not match packages/cli version $packageVersion"
          }

      - name: Build native bridge
        run: npm run build:native

      - name: Run tests
        run: npm test

      - name: Build TypeScript packages and controller VSIX
        run: npm run build

      - name: Package release artifacts
        run: npm run package:release

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-ext-test-release
          path: release-artifacts/*
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          generate_release_notes: true
